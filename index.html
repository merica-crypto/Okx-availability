<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banking App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: hsl(220, 20%, 10%); color: hsl(0, 0%, 95%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; }
  .container { width: 100%; max-width: 420px; padding: 24px 16px; display: flex; flex-direction: column; min-height: 100vh; }
  .close-btn { width: 40px; height: 40px; border-radius: 50%; background: hsl(220, 10%, 30%); border: none; color: hsl(220, 10%, 60%); font-size: 18px; cursor: pointer; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; }
  h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
  .card { background: hsl(220, 15%, 18%); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; cursor: pointer; border: none; background: none; width: 100%; color: hsl(220, 10%, 60%); font-size: 13px; font-weight: 600; }
  .card-header svg { width: 20px; height: 20px; }
  .account-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
  .flag { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; position: relative; }
  .flag-eu { background: hsl(225, 70%, 30%); }
  .flag-us { background: hsl(0, 80%, 90%); }
  .flag-all { background: hsl(220, 10%, 25%); font-size: 18px; color: hsl(0, 0%, 95%); }
  .badge { position: absolute; bottom: -2px; right: -2px; width: 16px; height: 16px; background: hsl(210, 80%, 55%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; color: white; }
  .row-info { flex: 1; }
  .row-info p { font-size: 14px; font-weight: 600; }
  .row-info small { font-size: 12px; color: hsl(220, 10%, 60%); }
  .row-amount { font-size: 14px; font-weight: 600; }
  .promo-card { display: flex; align-items: center; gap: 12px; }
  .promo-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 700; font-size: 14px; }
  .promo-icon-savings { background: hsl(25, 95%, 55%); color: white; }
  .promo-icon-joint { background: hsl(270, 60%, 65%); color: white; font-size: 18px; }
  .promo-info { flex: 1; }
  .promo-info p { font-size: 14px; font-weight: 600; }
  .promo-info small { font-size: 12px; color: hsl(220, 10%, 60%); }
  .discover-btn { background: hsl(220, 10%, 30%); color: hsl(0, 0%, 80%); border: none; font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
  .add-btn { display: flex; align-items: center; gap: 8px; background: hsl(0, 0%, 95%); color: hsl(220, 20%, 10%); border: none; font-size: 14px; font-weight: 600; padding: 12px 24px; border-radius: 24px; cursor: pointer; margin: auto auto 32px; }
  .mb-32 { margin-bottom: 32px; }
  /* Dialog */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 50; }
  .overlay.active { display: flex; }
  .dialog { background: hsl(220, 15%, 18%); border-radius: 16px; padding: 24px; width: 90%; max-width: 380px; }
  .dialog h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .dialog-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; }
  .dialog-row span:first-child { color: hsl(220, 10%, 60%); }
  .dialog-row span:last-child { font-weight: 600; }
  .dialog-buttons { display: flex; gap: 8px; margin-top: 20px; }
  .dialog-buttons button { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
  .btn-cancel { background: transparent; border: 1px solid hsl(220, 10%, 25%) !important; color: hsl(0, 0%, 95%); }
  .btn-confirm { background: hsl(25, 95%, 55%); color: white; }
  .success-msg { font-size: 14px; color: hsl(220, 10%, 60%); padding-bottom: 8px; }
</style>
</head>
<body>
<div class="container">
  <button class="close-btn">✕</button>
  <h2>Personal</h2>
  <div class="card">
    <button class="card-header" onclick="toggleAccounts()">
      <span>Accounts</span>
      <span id="chevron">▲</span>
    </button>
    <div id="accounts">
      <div class="account-row">
        <div class="flag flag-eu"><span>🇪🇺</span><div class="badge">✓</div></div>
        <div class="row-info"><p>Euro</p></div>
        <span class="row-amount">€300,000</span>
      </div>
      <div class="account-row">
        <div class="flag flag-us">🇺🇸</div>
        <div class="row-info"><p>US Dollar</p></div>
        <span class="row-amount">$324,000</span>
      </div>
      <div class="account-row">
        <div class="flag flag-all">⊕</div>
        <div class="row-info"><p>All accounts</p><small>2 accounts</small></div>
        <span class="row-amount">€300,000</span>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="promo-card">
      <div class="promo-icon promo-icon-savings">◎</div>
      <div class="promo-info"><p>Savings & Funds</p><small>Earn a return on your cash</small></div>
      <button class="discover-btn">Discover</button>
    </div>
  </div>
  <h2 class="mb-32" style="margin-top:16px">Joint</h2>
  <div class="card" style="margin-top:-16px">
    <div class="promo-card">
      <div class="promo-icon promo-icon-joint">&</div>
      <div class="promo-info"><p>Joint</p><small>For every kind of duo</small></div>
      <button class="discover-btn">Discover</button>
    </div>
  </div>
  <button class="add-btn" onclick="openDialog()">Withdraw to my Revolut account</button>
</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <div id="dialog-main">
      <h3>Confirm Transaction</h3>
      <div class="dialog-row"><span>Amount</span><span>€100.00</span></div>
      <div class="dialog-row"><span>From</span><span>Euro Account</span></div>
      <div class="dialog-row"><span>New Balance</span><span>€300,000</span></div>
      <div class="dialog-buttons">
        <button class="btn-cancel" onclick="closeDialog()">Cancel</button>
        <button class="btn-confirm" onclick="confirmTx()">Confirm €100</button>
      </div>
    </div>
    <div id="dialog-success" style="display:none">
      <h3>✅ Alert reveived!</h3>
      <p class="success-msg">AWAITING CONFIRMATION</p>
    </div>
  </div>
</div>

<script>
function toggleAccounts(){
  const a=document.getElementById('accounts'),c=document.getElementById('chevron');
  a.style.display=a.style.display==='none'?'block':'none';
  c.textContent=a.style.display==='none'?'▼':'▲';
}
function openDialog(){document.getElementById('overlay').classList.add('active')}
function closeDialog(){
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('dialog-main').style.display='block';
  document.getElementById('dialog-success').style.display='none';
}
function confirmTx(){
  document.getElementById('dialog-main').style.display='none';
  document.getElementById('dialog-success').style.display='block';
  setTimeout(closeDialog,1800);
}
</script>
</body>
</html>
